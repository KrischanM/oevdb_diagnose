name: API Doppel-Vergleichstest
run-name: API-Test Lauf (#${{ github.run_number }})

on:
  workflow_dispatch: # Für deinen manuellen Testknopf

  schedule:
    - cron: '03 22 * * *'   # 00:03 Uhr deutsche Sommerzeit (Sehr nah dran, weicht der .000 Sekunde aus)
    - cron: '18 22 * * *'   # 00:18 Uhr deutsche Sommerzeit (Falls die erste Welle noch den Server blockiert)
    - cron: '37 22 * * *'   # 00:37 Uhr deutsche Sommerzeit (Sicherheits-Lauf in einer absolut ruhigen Minute)
    - cron: '12 2 * * *'   # 04:12 Uhr deutsche Sommerzeit (Nacht-Test)
    - cron: '34 9 * * *'   # 11:34 Uhr deutsche Sommerzeit (Mittags-Test)
    - cron: '47 17 * * *'  # 19:47 Uhr deutsche Sommerzeit (Abend-Test)

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Alle Abhängigkeiten für beide Tests installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests httpx[http2] brotli

      - name: Warte zufällige Zeit (Bricht die .000 Sekunden Bot-Erkennung)
        run: |
          DELAY=$((1 + RANDOM % 44))
          echo "Warte absichtlich für $DELAY Sekunden..."
          sleep $DELAY

      - name: Starte 1. Test (Requests)
        run: python diagnose_requests.py

      - name: Starte 2. Test (Httpx)
        run: python diagnose_httpx.py
