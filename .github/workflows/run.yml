name: Öffentliche Vergabe API Diagnose-Test
run-name: API-Test Lauf (#${{ github.run_number }})
on:
  # Ermöglicht es dir, das Skript weiterhin JEDERZEIT manuell zu starten
  workflow_dispatch:

  # Die 3 verschiedenen Zeiten über krumme Cronjobs (Achtung: GitHub läuft auf UTC-Zeit!)
  schedule:
    - cron: '03 22 * * *'   # 00:03 Uhr deutsche Sommerzeit (Sehr nah dran, weicht der .000 Sekunde aus)
    - cron: '18 22 * * *'   # 00:18 Uhr deutsche Sommerzeit (Falls die erste Welle noch den Server blockiert)
    - cron: '37 22 * * *'   # 00:37 Uhr deutsche Sommerzeit (Sicherheits-Lauf in einer absolut ruhigen Minute)
    - cron: '12 2 * * *'   # 04:12 Uhr deutsche Sommerzeit (Nacht-Test)
    - cron: '34 9 * * *'   # 11:34 Uhr deutsche Sommerzeit (Mittags-Test)
    - cron: '47 17 * * *'  # 19:47 Uhr deutsche Sommerzeit (Abend-Test)

jobs:
  run-diagnose:
    
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install httpx[http2] brotli

      - name: Warte zufällige Zeit (Bricht die .000 Sekunden Bot-Erkennung der WAF)
        run: |
          DELAY=$((1 + RANDOM % 20))
          echo "Warte absichtlich für $DELAY Sekunden vor dem API-Aufruf..."
          sleep $DELAY

      - name: Starte Diagnose-Skript
        run: python diagnose.py
